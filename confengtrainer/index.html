<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caption Room — 会議英語リスニング訓練</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0d1424;
    --ink-2:#121c33;
    --panel:#16223e;
    --panel-2:#1b2a4a;
    --line:#27375c;
    --amber:#ffcb52;       /* live caption glow */
    --amber-dim:#caa23f;
    --teal:#34e0c4;        /* primary action */
    --teal-deep:#0f9e8a;
    --text:#eaf0fb;
    --muted:#8a99bd;
    --muted-2:#5e6e93;
    --good:#5fe08a;
    --miss:#ff7a85;
    --display:"Space Grotesk",system-ui,sans-serif;
    --body:"Inter",system-ui,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, #1a2c50 0%, transparent 55%),
      radial-gradient(900px 500px at -10% 110%, #15243f 0%, transparent 50%),
      var(--ink);
    color:var(--text);
    font-family:var(--body);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    min-height:100%;
  }
  .wrap{max-width:920px;margin:0 auto;padding:22px 20px 64px}

  /* ---------- Header ---------- */
  header{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}
  .brand{display:flex;align-items:center;gap:12px}
  .rec{width:11px;height:11px;border-radius:50%;background:var(--amber);box-shadow:0 0 0 0 rgba(255,203,82,.55);animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,203,82,.5)}70%{box-shadow:0 0 0 9px rgba(255,203,82,0)}100%{box-shadow:0 0 0 0 rgba(255,203,82,0)}}
  .brand h1{font-family:var(--display);font-weight:700;font-size:20px;letter-spacing:-.01em;line-height:1}
  .brand .sub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.04em;margin-top:4px}

  .modes{display:flex;background:var(--ink-2);border:1px solid var(--line);border-radius:11px;padding:4px;gap:4px}
  .modes button{
    font-family:var(--body);font-size:13px;font-weight:600;color:var(--muted);
    background:transparent;border:0;border-radius:8px;padding:8px 14px;cursor:pointer;transition:.15s;
  }
  .modes button[aria-pressed="true"]{background:var(--panel-2);color:var(--text);box-shadow:0 1px 0 rgba(255,255,255,.04) inset}
  .modes button:focus-visible{outline:2px solid var(--teal);outline-offset:2px}

  /* ---------- Category chips ---------- */
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .chip{
    font-family:var(--mono);font-size:11.5px;letter-spacing:.02em;
    color:var(--muted);background:var(--ink-2);border:1px solid var(--line);
    padding:7px 11px;border-radius:999px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:7px;
  }
  .chip .dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.55}
  .chip[aria-pressed="true"]{color:var(--ink);background:var(--amber);border-color:var(--amber);font-weight:600}
  .chip:focus-visible{outline:2px solid var(--teal);outline-offset:2px}

  /* ---------- Caption screen ---------- */
  .screen{
    position:relative;background:linear-gradient(180deg,var(--panel) 0%,var(--ink-2) 100%);
    border:1px solid var(--line);border-radius:18px;padding:30px 28px 26px;overflow:hidden;
  }
  .screen::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(180deg,rgba(255,255,255,.018) 0 2px,transparent 2px 4px);
  }
  .screen .tag{
    position:relative;display:inline-flex;align-items:center;gap:8px;
    font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--amber-dim);margin-bottom:18px;
  }
  .screen .tag b{color:var(--muted);font-weight:500;text-transform:none;letter-spacing:0}

  .caption{
    position:relative;font-family:var(--display);font-weight:500;
    font-size:clamp(19px,3vw,28px);line-height:1.65;letter-spacing:-.004em;
    min-height:3em;display:block;word-spacing:.06em;
  }
  .caption .word{display:inline-block;margin:2px 2px;color:var(--amber);transition:opacity .2s,color .2s;text-shadow:0 0 22px rgba(255,203,82,.18)}
  .caption.hidden .word{color:transparent;text-shadow:none;background:var(--panel-2);
    border-radius:6px;box-shadow:inset 0 0 0 1px var(--line)}
  .caption.live .word{opacity:0;animation:fadeWord .3s forwards}
  @keyframes fadeWord{to{opacity:1}}
  .placeholder{color:var(--muted-2);font-family:var(--display);font-size:clamp(20px,3vw,26px)}

  /* dictation input */
  .dict{position:relative;margin-top:6px;display:none}
  .dict textarea{
    width:100%;min-height:84px;resize:vertical;background:var(--ink);color:var(--text);
    border:1px solid var(--line);border-radius:12px;padding:14px 15px;
    font-family:var(--body);font-size:16px;line-height:1.5;
  }
  .dict textarea:focus{outline:2px solid var(--teal);outline-offset:1px;border-color:transparent}
  .result{margin-top:14px;font-family:var(--display);font-size:clamp(19px,3vw,25px);line-height:1.4;display:none}
  .result .w-ok{color:var(--good)}
  .result .w-bad{color:var(--miss);text-decoration:line-through;text-decoration-color:rgba(255,122,133,.5)}
  .result .w-extra{color:var(--muted-2)}
  .score{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:10px}

  /* ---------- Controls ---------- */
  .controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:22px}
  .btn{
    font-family:var(--body);font-weight:600;font-size:14px;border:1px solid var(--line);
    background:var(--ink-2);color:var(--text);border-radius:11px;padding:11px 15px;cursor:pointer;
    display:inline-flex;align-items:center;gap:8px;transition:.15s;
  }
  .btn:hover{border-color:var(--muted-2)}
  .btn:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
  .btn.play{background:var(--teal);color:#04231e;border-color:transparent;padding:11px 20px}
  .btn.play:hover{background:#43ecd0}
  .btn.amber{background:var(--amber);color:#2a1d00;border-color:transparent}
  .btn.amber:hover{background:#ffd66f}
  .btn svg{width:16px;height:16px;display:block}
  .spacer{flex:1 1 auto}
  .divider{width:1px;align-self:stretch;background:var(--line);margin:0 2px}

  .speed{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .speed input[type=range]{width:118px;accent-color:var(--teal)}
  .speed .val{color:var(--text);min-width:34px;text-align:right}

  .btn.auto[aria-pressed="true"]{background:var(--amber);color:#2a1d00;border-color:transparent}
  .reps{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--muted-2);letter-spacing:.04em}
  .reps button{font-family:var(--mono);font-size:12px;color:var(--muted);background:var(--ink-2);border:1px solid var(--line);border-radius:7px;padding:5px 9px;cursor:pointer;transition:.15s}
  .reps button[aria-pressed="true"]{background:var(--panel-2);color:var(--text);border-color:var(--muted-2)}
  .reps button:focus-visible{outline:2px solid var(--teal);outline-offset:2px}

  /* ---------- Footer meta ---------- */
  .meta{margin-top:18px;border:1px solid var(--line);border-radius:16px;background:var(--ink-2);overflow:hidden;display:none}
  .meta.show{display:block}
  .meta .row{padding:14px 18px;border-bottom:1px solid var(--line)}
  .meta .row:last-child{border-bottom:0}
  .meta .k{font-family:var(--mono);font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted-2);margin-bottom:5px}
  .meta .jp{font-size:16px;color:var(--text)}
  .meta .scene{font-size:14px;color:var(--muted)}
  .meta .tip{font-size:14px;color:var(--text)}
  .meta .tip b{color:var(--amber)}

  /* ---------- Nav ---------- */
  .nav{display:flex;align-items:center;justify-content:space-between;margin-top:20px;gap:12px}
  .counter{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .counter b{color:var(--text)}
  .navbtns{display:flex;gap:10px}

  .hint{margin-top:26px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted-2);letter-spacing:.03em}
  kbd{background:var(--ink-2);border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:1px 6px;font-family:var(--mono);font-size:11px;color:var(--muted)}

  /* ---------- Voice bar (bottom) ---------- */
  .voicebar{
    margin-top:18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    background:var(--ink-2);border:1px solid var(--line);border-radius:12px;padding:10px 14px;
  }
  .voicebar-label{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--muted)}
  .voicebar select{
    flex:1 1 220px;min-width:160px;background:var(--panel-2);color:var(--text);
    border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-family:var(--body);font-size:13px;
  }
  .voicebar select:focus-visible{outline:2px solid var(--teal);outline-offset:1px}
  .voicebar .btn{padding:8px 13px;font-size:13px}
  .voicebar-toggle{display:flex;align-items:center;gap:7px;font-family:var(--body);font-size:13px;color:var(--muted);cursor:pointer;user-select:none}
  .voicebar-toggle input{accent-color:var(--teal);width:15px;height:15px;cursor:pointer}
  .voicebar-toggle:has(input:checked){color:var(--text)}
  .voicebar-note{font-family:var(--mono);font-size:10.5px;color:var(--muted-2);flex-basis:100%}

  .warn{display:none;margin-top:14px;font-size:13px;color:var(--miss);font-family:var(--body)}

  @media (max-width:560px){
    .spacer{display:none}
    .divider{display:none}
    .controls{gap:8px}
    .btn{padding:10px 12px;font-size:13px}
    .speed{order:5;width:100%;justify-content:flex-start;margin-top:4px}
  }
  @media (prefers-reduced-motion:reduce){
    .rec{animation:none}
    .caption .live .word{animation:none;opacity:1}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="rec" aria-hidden="true"></span>
      <div>
        <h1>Caption&nbsp;Room</h1>
        <div class="sub">SE / AI 国際会議で聴く英語 — listening trainer</div>
      </div>
    </div>
    <div class="modes" role="group" aria-label="練習モード">
      <button id="mode-listen" aria-pressed="true">Listen</button>
      <button id="mode-dict" aria-pressed="false">Dictation</button>
    </div>
  </header>

  <div class="chips" id="chips" role="group" aria-label="場面カテゴリ"></div>

  <section class="screen">
    <div class="tag"><span id="cat-label">—</span> <b id="register">　</b></div>

    <div class="caption hidden" id="caption" aria-live="polite">
      <span class="placeholder">▶ を押して聴いてみましょう</span>
    </div>

    <div class="dict" id="dictBox">
      <textarea id="dictInput" placeholder="聴こえた英文を入力して “答え合わせ”…" autocomplete="off" spellcheck="false"></textarea>
      <div class="result" id="dictResult"></div>
      <div class="score" id="dictScore"></div>
    </div>

    <div class="controls">
      <button class="btn play" id="playBtn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M7 5l12 7-12 7V5z" fill="currentColor"/></svg>
        <span id="playLabel">Play ×3</span>
      </button>
      <button class="btn" id="slowBtn" title="ゆっくり1回">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        Slow
      </button>
      <button class="btn auto" id="autoBtn" aria-pressed="false" title="聞き流し用に次々と連続再生">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        <span id="autoLabel">連続再生</span>
      </button>
      <button class="btn" id="revealBtn">字幕を表示</button>
      <button class="btn amber" id="checkBtn" style="display:none">答え合わせ</button>
      <span class="divider" aria-hidden="true"></span>
      <button class="btn" id="prevBtn" title="前のフレーズ">← Prev</button>
      <button class="btn" id="nextBtn" title="次のフレーズ">Next →</button>
      <div class="spacer"></div>
      <div class="reps" id="reps" role="group" aria-label="繰り返し回数">
        <span>REPEAT</span>
        <button data-n="1" aria-pressed="false">×1</button>
        <button data-n="2" aria-pressed="false">×2</button>
        <button data-n="3" aria-pressed="true">×3</button>
      </div>
      <div class="speed">
        <span>SPEED</span>
        <input type="range" id="speed" min="0.6" max="1.1" step="0.05" value="0.92" aria-label="再生速度">
        <span class="val" id="speedVal">0.92×</span>
      </div>
    </div>
    <p class="warn" id="warn">お使いのブラウザは音声合成に対応していないようです。Chrome / Edge / Safari の最新版でお試しください。</p>
  </section>

  <div class="meta" id="meta">
    <div class="row"><div class="k">日本語</div><div class="jp" id="m-jp"></div></div>
    <div class="row"><div class="k">使う場面</div><div class="scene" id="m-scene"></div></div>
    <div class="row"><div class="k">聴き取りのコツ</div><div class="tip" id="m-tip"></div></div>
  </div>

  <div class="nav">
    <div class="counter"><b id="idx">1</b> / <span id="total">1</span></div>
    <div class="navbtns">
      <button class="btn" id="shuffleBtn">Shuffle</button>
    </div>
  </div>

  <p class="hint">
    <kbd>Space</kbd> 再生 &nbsp;·&nbsp; <kbd>R</kbd> もう一度 &nbsp;·&nbsp; <kbd>←</kbd> <kbd>→</kbd> 移動 &nbsp;·&nbsp; <kbd>Enter</kbd> 表示／答え合わせ
  </p>

  <div class="voicebar">
    <span class="voicebar-label">SPEAKER</span>
    <select id="voiceSelect" aria-label="音声の話者を選択"></select>
    <button class="btn" id="voiceTestBtn" title="選んだ声でサンプル再生">試聴</button>
    <label class="voicebar-toggle" id="voiceRandomLabel" title="毎回ランダムに声を切り替えます">
      <input type="checkbox" id="voiceRandom">
      <span>毎回ランダムに切り替える</span>
    </label>
    <span class="voicebar-note" id="voiceNote"></span>
  </div>
</div>

<script>
/* ============ データ ============ */
const DATA = [
  // --- Opening / Keynote ---
  {cat:"opening", en:"Thank you all for being here, and welcome to the opening keynote.",
   jp:"お越しいただきありがとうございます。開会の基調講演へようこそ。",
   scene:"司会・主催者が会場全体に向けて開会を告げる定番の一言。",
   tip:"<b>Thank you all</b> は「サンキューオール」と一語のようにつながる。"},
  {cat:"opening", en:"We have a packed agenda today, so let's dive right in.",
   jp:"本日は盛りだくさんの予定です。さっそく始めましょう。",
   scene:"前置きを切り上げて本題に入る合図。",
   tip:"<b>dive right in</b>＝「すぐ本題へ」。right の r と in が軽くつながる。"},
  {cat:"opening", en:"It's my great pleasure to introduce our keynote speaker.",
   jp:"基調講演者をご紹介できることを大変嬉しく思います。",
   scene:"登壇者を紹介する前の決まり文句。",
   tip:"<b>It's my</b> は「イツマイ」と短く。pleasure の発音は「プレジャー」。"},

  // --- Presenting ---
  {cat:"present", en:"Let me walk you through the architecture of our system.",
   jp:"私たちのシステムの構成を順に説明させてください。",
   scene:"発表で図や構成を一つずつ解説し始めるとき。",
   tip:"<b>walk you through</b>＝「順を追って説明する」。聴き取りの最頻出フレーズ。"},
  {cat:"present", en:"As you can see on this slide, the latency dropped significantly.",
   jp:"このスライドの通り、レイテンシが大幅に下がりました。",
   scene:"グラフや結果を指し示しながら。",
   tip:"<b>As you can see</b> は一気に発音される。significantly は「スィグニフィカントリ」。"},
  {cat:"present", en:"I'll skip over the details here in the interest of time.",
   jp:"時間の都合上、ここは詳細を飛ばします。",
   scene:"時間が押しているときの常套句。",
   tip:"<b>in the interest of time</b>＝「時間の都合で」。会議では超頻出。"},
  {cat:"present", en:"To put this into perspective, that's a tenfold improvement.",
   jp:"分かりやすく言うと、これは10倍の改善です。",
   scene:"数字の意味を直感的に伝えるとき。",
   tip:"<b>put this into perspective</b>＝「正しく捉えると／例えると」。"},
  {cat:"present", en:"Let me back up for a second and give you some context.",
   jp:"少し戻って、背景を説明させてください。",
   scene:"話の前提に立ち返るとき。",
   tip:"<b>back up</b> はここでは「(話を)戻す」。for a second＝「ちょっと」。"},
  {cat:"present", en:"The key takeaway here is that the model generalizes well.",
   jp:"ここでの要点は、モデルがうまく汎化するということです。",
   scene:"スライドの結論をまとめる一文。",
   tip:"<b>takeaway</b>＝「持ち帰るべき要点」。プレゼンの締めで頻出。"},

  // --- Q&A: asking ---
  {cat:"ask", en:"Thanks for the talk. I have a quick question about your evaluation setup.",
   jp:"ご講演ありがとうございます。評価の設定について一つ簡単な質問があります。",
   scene:"質疑応答で質問を始めるときの入り。",
   tip:"<b>quick question</b> はほぼ一語。「クイックエスチョン」。"},
  {cat:"ask", en:"Could you elaborate on how you handled the edge cases?",
   jp:"例外的なケースをどう扱ったか、もう少し詳しく教えていただけますか？",
   scene:"もっと詳しい説明を求めるとき。",
   tip:"<b>elaborate on</b>＝「〜について詳述する」。質問で多用される。"},
  {cat:"ask", en:"I'm curious whether this approach scales to larger datasets.",
   jp:"この手法がより大きなデータでも通用するのか気になります。",
   scene:"手法の適用範囲を問うとき。",
   tip:"<b>scales to</b>＝「〜まで拡張できる」。curious＝「興味がある／気になる」。"},
  {cat:"ask", en:"Sorry, could you go back to the previous slide?",
   jp:"すみません、前のスライドに戻っていただけますか？",
   scene:"見たい図に戻してほしいとき。",
   tip:"<b>go back to</b> は「ゴウバックトゥ」。previous＝「プリーヴィアス」。"},

  // --- Q&A: answering ---
  {cat:"answer", en:"That's a great question.",
   jp:"とても良い質問ですね。",
   scene:"質問に答える前のクッション表現。考える時間も稼げる。",
   tip:"会議で最も聞く一文。<b>That's a</b> は「ザッツァ」とつながる。"},
  {cat:"answer", en:"I'm not sure I fully understood. Could you rephrase that?",
   jp:"完全には理解できませんでした。言い換えていただけますか？",
   scene:"質問の意図が掴めなかったとき。",
   tip:"<b>rephrase</b>＝「言い換える」。聞き返しの丁寧な定番。"},
  {cat:"answer", en:"We didn't have time to test that, but it's on our roadmap.",
   jp:"それを試す時間はありませんでしたが、今後の予定に入っています。",
   scene:"未対応の点を正直に答えつつ前向きに締める。",
   tip:"<b>on our roadmap</b>＝「計画にある」。didn't は「ディドゥン」と弱く。"},
  {cat:"answer", en:"Let's take this offline and discuss it afterwards.",
   jp:"この件は別途、後で個別に話しましょう。",
   scene:"その場で長引く話題を切り上げるとき。",
   tip:"<b>take this offline</b>＝「会議の場ではなく後で個別に」。比喩表現なので要暗記。"},
  {cat:"answer", en:"Good point. We actually ran an ablation on exactly that.",
   jp:"良い指摘です。まさにその点でアブレーション実験をしました。",
   scene:"鋭い質問に応じるとき(AI論文系)。",
   tip:"<b>ablation</b>＝「(要素を削る)アブレーション実験」。actually は「アクチュリ」。"},

  // --- Chairing / moderating ---

let pos = 0;
let revealed = false;
let checked = false;
let voice = null;

let repeatCount = 3;          // 1回の再生で読む回数
let auto = false, autoToken = 0; // 連続再生(聞き流し)

/* ============ 要素 ============ */
const $ = id => document.getElementById(id);
const caption = $("caption"), dictBox = $("dictBox"), dictInput = $("dictInput");
const dictResult = $("dictResult"), dictScore = $("dictScore");
const meta = $("meta");

/* ============ 音声 ============ */
const synth = window.speechSynthesis;
if(!synth){ $("warn").style.display="block"; }

// Edge(Chromium版含む)は声を頻繁に切り替えると音声合成自体が無音になる既知の問題があるため、
// ランダム切替機能はEdgeでは無効化する
const isEdge = /Edg(e|A|iOS)?\//i.test(navigator.userAgent || "");
if(isEdge){
  const cb = $("voiceRandom");
  cb.disabled = true;
  $("voiceRandomLabel").title = "Edgeでは音声合成の安定性のため、ランダム切替には対応していません";
}

function getVoiceList(){
  const all = synth.getVoices();
  const en = all.filter(v=>/^en(-|_|$)/i.test(v.lang));
  return en.length ? en : all;
}

function pickVoice(){
  if(!synth) return;
  const list = getVoiceList();
  if(!list.length) return;

  const sel = $("voiceSelect");
  const prevValue = sel.value;
  sel.innerHTML = "";
  list.forEach((v,i)=>{
    const opt = document.createElement("option");
    opt.value = i;
    const tag = v.localService ? "" : " ・network";
    opt.textContent = `${v.name} (${v.lang})${tag}`;
    sel.appendChild(opt);
  });

  // 自然な英語ボイスを優先してデフォルト選択(端末内蔵=localServiceを優先)
  let idx = list.findIndex(v=>v.localService && /Google US English|Samantha|Microsoft (Aria|Jenny|Guy)/i.test(v.name));
  if(idx<0) idx = list.findIndex(v=>v.localService && /en-US/i.test(v.lang));
  if(idx<0) idx = list.findIndex(v=>v.localService);
  if(idx<0) idx = 0;

  // すでにユーザーが選んでいた声が再生成後も存在するなら維持
  if(prevValue!==""){
    const prevVoice = list[parseInt(prevValue,10)];
    if(prevVoice){
      const stillThere = list.findIndex(v=>v.name===prevVoice.name && v.lang===prevVoice.lang);
      if(stillThere>=0) idx = stillThere;
    }
  }

  sel.value = idx;
  voice = list[idx];
  syncSelectToVoice();
}
if(synth){ pickVoice(); synth.onvoiceschanged = pickVoice; }

function syncSelectToVoice(){
  const list = getVoiceList();
  const idx = list.findIndex(v=>voice && v.name===voice.name && v.lang===voice.lang);
  if(idx>=0) $("voiceSelect").value = idx;
  if(voice){
    const kind = voice.localService ? "端末内蔵" : "ネットワーク";
    const skip = skippedCount>0 ? ` ・スキップ ${skippedCount} 回` : "";
    $("voiceNote").textContent = `${list.length}声 ・現在: ${voice.name} (${kind})${skip}`;
  }
}

/* ---- 鳴らない声を記憶して以後の抽選から除外する ---- */
const badVoiceKeys = new Set();
function voiceKey(v){ return v ? `${v.name}|${v.lang}` : "none"; }

function pickWorkingRandomVoice(){
  const all = getVoiceList();
  const notBad = all.filter(v=>!badVoiceKeys.has(voiceKey(v)));
  const pool = notBad.length ? notBad : all; // ネットワーク音声も含め、全声を対象にする
  if(!pool.length) return null;
  return pool[Math.floor(Math.random()*pool.length)];
}

function maybeRandomizeVoice(){
  if(isEdge) return;                       // Edgeではランダム切替を行わない
  if(!$("voiceRandom").checked) return;
  const v = pickWorkingRandomVoice();
  if(!v) return;
  voice = v;
  syncSelectToVoice();
}

/* ---- 実際に1文を発声する。声が無反応なら検知して次へ進む(再帰リトライはしない) ---- */
function estimateMs(text, rate){
  return Math.max(1200, (text.split(" ").length * 420) / rate);
}
// Chromeはspeak()待ち中のSpeechSynthesisUtteranceをGCで消してしまい、
// 無音のままonendだけ呼んでしまうことがある。参照を保持して防ぐ。
const liveUtterances = [];
function speakOnce(text, rate, onDone){
  if(!synth){ onDone && onDone(); return; }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = voice ? voice.lang : "en-US";
  if(voice) u.voice = voice;
  u.rate = rate; u.pitch = 1;
  liveUtterances.push(u);

  let started = false, finished = false;
  const finish = ()=>{
    if(finished) return;
    finished = true;
    clearTimeout(startCheck); clearTimeout(endWatch);
    const idx = liveUtterances.indexOf(u);
    if(idx>=0) liveUtterances.splice(idx,1);
    u.onstart = null; u.onend = null; u.onerror = null;
    onDone && onDone();
  };

  // 1.3秒たっても発声が始まらなければ、その声を要注意としてマークしてこの回は諦める
  // (再帰でリトライしない: 二重に完了通知が走るバグの元だったため)
  const startCheck = setTimeout(()=>{
    if(started || finished) return;
    if($("voiceRandom").checked){
      badVoiceKeys.add(voiceKey(voice));
      skippedCount++;
      syncSelectToVoice();
    }
    finish();
    synth.cancel(); // 取り残された発声指示をキューから確実に破棄
  }, 1300);

  // 発声が始まった後、終了通知が来ない場合の保険(見張りタイマー)
  const endWatch = setTimeout(finish, estimateMs(text, rate) + 4000);

  u.onstart = ()=>{ started = true; clearTimeout(startCheck); };
  u.onend = finish;
  u.onerror = finish;
  synth.speak(u);
}

$("voiceSelect").addEventListener("change", e=>{
  const list = getVoiceList();
  voice = list[parseInt(e.target.value,10)] || null;
});
$("voiceRandom").addEventListener("change", e=>{
  const on = e.target.checked;
  $("voiceSelect").disabled = on;
  if(on){ badVoiceKeys.clear(); maybeRandomizeVoice(); }
});
$("voiceTestBtn").onclick = ()=>{
  if(!synth) return;
  synth.cancel();
  const u = new SpeechSynthesisUtterance("Thanks for the talk. I have a quick question about your evaluation setup.");
  u.lang = voice ? voice.lang : "en-US";
  if(voice) u.voice = voice;
  u.rate = parseFloat($("speed").value);
  synth.speak(u);
};

function speak(rate, times){
  if(!synth) return;
  stopAuto();
  synth.cancel();
  maybeRandomizeVoice();
  const r = rate ?? parseFloat($("speed").value);
  const n = times ?? repeatCount;
  const text = current().en;
  let i = 0;
  const next = ()=>{
    if(i>=n) return;
    i++;
    speakOnce(text, r, ()=>{ if(i<n) setTimeout(next, 350); });
  };
  next();
}

/* ---- 連続再生(聞き流し) ---- */
let autoKeepAlive = null;
function startAuto(){
  if(!synth) return;
  if(mode!=="listen") setMode("listen");   // 入力欄を畳んで聴く画面に
  auto = true;
  const tk = ++autoToken;
  $("autoBtn").setAttribute("aria-pressed","true");
  $("autoLabel").textContent = "停止";
  synth.cancel();
  // Chrome等で音声合成が無音のまま固まる既知の不具合への保険
  clearInterval(autoKeepAlive);
  autoKeepAlive = setInterval(()=>{ if(auto && synth.speaking) synth.resume(); }, 4000);
  runCard(tk);
}
function stopAuto(){
  if(!auto) return;
  auto = false; autoToken++;
  clearInterval(autoKeepAlive);
  if(synth) synth.cancel();
  $("autoBtn").setAttribute("aria-pressed","false");
  $("autoLabel").textContent = "連続再生";
}
function runCard(tk){
  if(!auto || tk!==autoToken) return;
  maybeRandomizeVoice();
  reveal(true);                              // 聞き流しでも字幕と訳を表示
  const r = parseFloat($("speed").value);
  const text = current().en;
  let done = 0;
  const one = ()=>{
    if(!auto || tk!==autoToken) return;
    speakOnce(text, r, ()=>{
      if(!auto || tk!==autoToken) return;
      done++;
      if(done < repeatCount){ setTimeout(one, 450); }
      else { setTimeout(()=>{ if(auto && tk===autoToken){ go(1); runCard(tk); } }, 1200); }
    });
  };
  one();
}

/* ============ レンダリング ============ */
function current(){ return deck[pos]; }

function buildDeck(){
  deck = activeCat==="all" ? DATA.slice() : DATA.filter(d=>d.cat===activeCat);
  pos = 0;
}

function renderChips(){
  const c = $("chips"); c.innerHTML="";
  Object.entries(CATS).forEach(([key,info])=>{
    const b=document.createElement("button");
    b.className="chip"; b.setAttribute("aria-pressed", key===activeCat);
    b.style.color = key===activeCat ? "" : info.color;
    b.innerHTML = `<span class="dot"></span>${info.label}`;
    b.onclick=()=>{ activeCat=key; buildDeck(); renderChips(); renderCard(); };
    c.appendChild(b);
  });
}

function renderCard(){
  const card = current();
  $("total").textContent = deck.length;
  $("idx").textContent = pos+1;
  $("cat-label").textContent = CATS[card.cat].label;
  $("register").textContent = "";

  revealed = false; checked = false;
  // caption
  caption.classList.add("hidden");
  caption.classList.remove("live");
  caption.innerHTML = card.en.split(" ").map(w=>`<span class="word">${w}</span>`).join(" ");
  if(mode==="listen"){
    caption.style.display="block";
    dictBox.style.display="none";
  }else{
    // dictation: 画面は隠したまま、入力欄を出す
    caption.style.display="none";
    dictBox.style.display="block";
    dictInput.value=""; dictResult.style.display="none"; dictScore.textContent="";
    setTimeout(()=>dictInput.focus(),50);
  }
  meta.classList.remove("show");
  updateControls();
}

function updateControls(){
  $("revealBtn").style.display = (mode==="listen") ? "" : "none";
  $("checkBtn").style.display  = (mode==="dict")   ? "" : "none";
  $("revealBtn").textContent = revealed ? "字幕を隠す" : "字幕を表示";
}

function reveal(show){
  revealed = (show!==undefined)?show:!revealed;
  if(revealed){
    caption.classList.remove("hidden");
    caption.classList.add("live");
    meta.classList.add("show");
    fillMeta();
  }else{
    caption.classList.add("hidden");
    caption.classList.remove("live");
    meta.classList.remove("show");
  }
  updateControls();
}

function fillMeta(){
  const c=current();
  $("m-jp").textContent=c.jp;
  $("m-scene").textContent=c.scene;
  $("m-tip").innerHTML=c.tip;
}

/* ---- ディクテーション採点 ---- */
function norm(s){
  return s.toLowerCase().replace(/[.,?!;:"'’“”\-—()]/g," ").replace(/\s+/g," ").trim();
}
function check(){
  const target = norm(current().en).split(" ").filter(Boolean);
  const got    = norm(dictInput.value).split(" ").filter(Boolean);
  // 単純な単語アライメント(LCS)で正誤を可視化
  const m=target.length, n=got.length;
  const dp=Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    dp[i][j]= target[i-1]===got[j-1] ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j],dp[i][j-1]);
  // 復元してtarget語ごとに一致したか印
  let i=m,j=n; const hit=new Array(m).fill(false);
  while(i>0&&j>0){
    if(target[i-1]===got[j-1]){hit[i-1]=true;i--;j--;}
    else if(dp[i-1][j]>=dp[i][j-1])i--; else j--;
  }
  const correct = hit.filter(Boolean).length;
  // 元の文(大小文字・記号付き)で色付け表示
  const words = current().en.split(" ");
  let k=-1;
  dictResult.innerHTML = words.map(w=>{
    const bare = norm(w);
    if(!bare) return w;
    k++;
    return `<span class="${hit[k]?'w-ok':'w-bad'}">${w}</span>`;
  }).join(" ");
  dictResult.style.display="block";
  const pct = m? Math.round(correct/m*100):0;
  dictScore.textContent = `正解 ${correct}/${m} 語  (${pct}%)  ·  緑=合っていた語 / 赤=聴き逃した語`;
  checked=true;
  meta.classList.add("show"); fillMeta();
}

/* ============ ナビ ============ */
function go(delta){
  pos = (pos + delta + deck.length) % deck.length;
  renderCard();
}
function shuffle(){
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  pos=0; renderCard();
}

/* ============ モード ============ */
function setMode(m){
  stopAuto();
  mode=m;
  $("mode-listen").setAttribute("aria-pressed", m==="listen");
  $("mode-dict").setAttribute("aria-pressed", m==="dict");
  renderCard();
}

/* ============ イベント ============ */
$("playBtn").onclick = ()=>speak();
$("slowBtn").onclick = ()=>{stopAuto();speak(0.6,1);};
$("autoBtn").onclick = ()=>{ auto ? stopAuto() : startAuto(); };
$("revealBtn").onclick = ()=>{stopAuto();reveal();};
$("checkBtn").onclick = ()=>{stopAuto();check();};
$("prevBtn").onclick = ()=>{stopAuto();go(-1);};
$("nextBtn").onclick = ()=>{stopAuto();go(1);};
$("shuffleBtn").onclick = ()=>{stopAuto();shuffle();};
$("mode-listen").onclick=()=>setMode("listen");
$("mode-dict").onclick=()=>setMode("dict");
$("speed").oninput = e=>$("speedVal").textContent = parseFloat(e.target.value).toFixed(2)+"×";

// 繰り返し回数
$("reps").querySelectorAll("button").forEach(b=>{
  b.onclick = ()=>{
    repeatCount = parseInt(b.dataset.n,10);
    $("reps").querySelectorAll("button").forEach(x=>x.setAttribute("aria-pressed", x===b));
    $("playLabel").textContent = "Play ×"+repeatCount;
  };
});

document.addEventListener("keydown", e=>{
  const typing = document.activeElement===dictInput;
  if(e.code==="Space" && !typing){ e.preventDefault(); speak(); }
  else if(e.key.toLowerCase()==="r" && !typing){ speak(); }
  else if(e.key==="ArrowRight" && !typing){ go(1); }
  else if(e.key==="ArrowLeft" && !typing){ go(-1); }
  else if(e.key==="Enter"){
    if(mode==="listen" && !typing){ reveal(); }
    else if(mode==="dict" && typing && (e.metaKey||e.ctrlKey)){ e.preventDefault(); check(); }
  }
});

/* ============ 起動 ============ */
$("speedVal").textContent = parseFloat($("speed").value).toFixed(2)+"×";
buildDeck(); renderChips(); renderCard();
</script>
</body>
