<!--
AI Model: Claude Sonnet 4.6
User Prompt: hanamiディレクトリに花見をテーマとした美麗で魅力的でインタラクティブで日本的でモダンなページを作って
AI Approach: HTML5 Canvas 全画面レンダリング。再帰的桜の木描画（シード乱数）、花びら物理シミュレーション、昼夕夜3モード時刻遷移（スムーズブレンド）、Web Audio APIによる琴風音と環境音、俳句縦書き表示
Implementation Intent: インタラクティブな日本の花見体験。クリックで花びらを舞わせ、時刻変化で異なる表情を楽しめる没入型Webアプリ
-->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花見 〜 Hanami</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:#000; font-family:'Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',Georgia,serif; }
#canvas { display:block; cursor:crosshair; }

#ui { position:fixed; inset:0; pointer-events:none; z-index:10; }

/* 四隅の装飾 */
.corner { position:absolute; width:52px; height:52px; }
.corner::before,.corner::after { content:''; position:absolute; background:rgba(255,175,200,0.45); }
.corner.tl { top:18px; left:18px; }

.corner.tr { top:18px; right:18px; }
.corner.tr::before { width:2px; height:38px; top:0; right:0; }
.corner.tr::after  { width:38px; height:2px; top:0; right:0; }
.corner.bl { bottom:18px; left:18px; }
.corner.bl::before { width:2px; height:38px; bottom:0; left:0; }
.corner.bl::after  { width:38px; height:2px; bottom:0; left:0; }
.corner.br { bottom:18px; right:18px; }
.corner.br::before { width:2px; height:38px; bottom:0; right:0; }

<body>
<canvas id="canvas"></canvas>
<div id="ui">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div id="title">
        <div id="title-jp">花　見</div>

    <div id="wind-wrap">

        <button class="t-btn active" data-mode="day">昼</button>

    </div>

    <button id="haiku-btn">俳句 ›</button>
    <div id="hint">クリックで花びらを舞わせる</div>
</div>

<script>
// ============================================================
// 花見 HANAMI — Interactive Cherry Blossom Experience
// ============================================================

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0;

// ---- Seeded deterministic RNG (xorshift32) ----
function makeRng(seed) {
    let s = (seed ^ 0xDEADBEEF) >>> 0;
    return () => {
        s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
        return (s >>> 0) / 4294967296;
    };
}

// ---- Color helpers ----
function hexRgb(h) {
    return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}
const lerp = (a,b,t) => a+(b-a)*t;
function lerpHex(a,b,t) {
    const [ar,ag,ab]=hexRgb(a),[br,bg,bb]=hexRgb(b);
    return `rgb(${Math.round(lerp(ar,br,t))},${Math.round(lerp(ag,bg,t))},${Math.round(lerp(ab,bb,t))})`;
}

// ============================================================
// MODE DEFINITIONS
// ============================================================
const MODES = {
    day: {
        sky: ['#62A8D0','#AACFE8','#E5C5D8','#FFE5F0'],
        skyPos: [0, 0.3, 0.65, 1],
        mountain:  {r:142,g:172,b:205,a:0.45},
        ground:    {top:'#6E9E58',bot:'#4B7A38'},
        treeRgb:   [62,36,12],
        blossomRgb:[255,182,202],
        blossomA:  0.70,
        petalPalette:['#FFB7C5','#FF9EB8','#FFCDD8','#FFE4EC','#FFF2F6'],
        fog:       {r:255,g:238,b:248,a:0.13},
        water:     {r:110,g:172,b:215,a:0.38},
        showMoon:false, showStars:false,
        lanternA:  0.0,
        torii:     {r:158,g:188,b:215,a:0.42},
    },
    dusk: {
        sky: ['#1A0830','#7C1A58','#C83520','#F4A02A'],
        skyPos: [0, 0.3, 0.65, 1],
        mountain:  {r:52,g:16,b:62,a:0.80},
        ground:    {top:'#3C2210',bot:'#271608'},
        treeRgb:   [18,8,4],
        blossomRgb:[255,148,82],
        blossomA:  0.50,
        petalPalette:['#FFAA55','#FF8838','#FFB86A','#FFCE88'],
        fog:       {r:198,g:82,b:42,a:0.09},
        water:     {r:172,g:62,b:52,a:0.33},
        showMoon:false, showStars:false,
        lanternA:  0.78,
        torii:     {r:78,g:22,b:78,a:0.75},
    },
    night: {
        sky: ['#000407','#030B1C','#080F28','#140726'],
        skyPos: [0, 0.3, 0.65, 1],
        mountain:  {r:5,g:3,b:16,a:0.96},
        ground:    {top:'#0D071E',bot:'#06040F'},
        treeRgb:   [6,3,10],
        blossomRgb:[215,178,228],
        blossomA:  0.30,
        petalPalette:['rgba(255,215,232,0.88)','rgba(238,202,255,0.78)','rgba(255,235,248,0.70)','rgba(198,172,240,0.65)'],
        fog:       {r:92,g:52,b:152,a:0.07},
        water:     {r:20,g:42,b:112,a:0.58},
        showMoon:true, showStars:true,
        lanternA:  1.0,
        torii:     {r:4,g:2,b:14,a:0.92},
    }
};

let curMode  = 'day', prevMode = 'day', modeT = 1.0;
const TRANS_SPD = 0.022;

function getM() {
    if (modeT >= 1) return MODES[curMode];
    const A = MODES[prevMode], B = MODES[curMode], t = modeT;
    const li = (k,s) => Math.round(lerp(A[k][s], B[k][s], t));
    return {
        sky:        A.sky.map((c,i) => lerpHex(c, B.sky[i], t)),
        skyPos:     A.skyPos,
        mountain:   {r:li('mountain','r'),g:li('mountain','g'),b:li('mountain','b'),a:lerp(A.mountain.a,B.mountain.a,t)},
        ground:     {top:lerpHex(A.ground.top,B.ground.top,t), bot:lerpHex(A.ground.bot,B.ground.bot,t)},
        treeRgb:    A.treeRgb.map((v,i) => Math.round(lerp(v,B.treeRgb[i],t))),
        blossomRgb: A.blossomRgb.map((v,i) => Math.round(lerp(v,B.blossomRgb[i],t))),
        blossomA:   lerp(A.blossomA, B.blossomA, t),
        petalPalette: t > 0.5 ? B.petalPalette : A.petalPalette,
        fog:        {r:li('fog','r'),g:li('fog','g'),b:li('fog','b'),a:lerp(A.fog.a,B.fog.a,t)},
        water:      {r:li('water','r'),g:li('water','g'),b:li('water','b'),a:lerp(A.water.a,B.water.a,t)},
        showMoon:   t > 0.5 ? B.showMoon  : A.showMoon,
        showStars:  t > 0.5 ? B.showStars : A.showStars,
        lanternA:   lerp(A.lanternA, B.lanternA, t),
        torii:      {r:li('torii','r'),g:li('torii','g'),b:li('torii','b'),a:lerp(A.torii.a,B.torii.a,t)},
    };
}

// ============================================================
// STATIC SCENE ELEMENTS
// ============================================================
let stars = [], mountainPts = [], lanternPts = [];
let prevTree = null, curTree = null;

function buildStars() {
    const rng = makeRng(137);
    stars = Array.from({length:300}, () => ({
        x: rng()*W, y: rng()*H*0.52,
        r: rng()*1.25+0.2,
        phase: rng()*Math.PI*2,
        spd:   rng()*0.042+0.012,
    }));
}

function buildMountains() {
    const rng = makeRng(88);
    const pts = [[0,0.60],[0.08,0.40],[0.17,0.50],[0.27,0.30],[0.38,0.46],
                 [0.50,0.26],[0.62,0.38],[0.72,0.32],[0.82,0.46],[0.91,0.38],[1,0.58]];
    mountainPts = pts.map(([px,py]) => ({x:px*W, y:H*py+(rng()-0.5)*H*0.014}));
}

function buildLanterns() {
    const fx = [0.24,0.36,0.50,0.64,0.76];
    lanternPts = fx.map(x => {
        const sag = 4*0.095*(x-0.18)/(0.82-0.18)*(1-(x-0.18)/(0.82-0.18));
        return {x:x*W, y:H*(0.352+sag*0.12)};
    });
}

// ---- Tree canvas ----
function branchDraw(tcx, rng, cx, cy, angle, len, depth, col) {
    if (depth <= 0 || len < 4) return;
    const ex = cx+Math.cos(angle)*len, ey = cy+Math.sin(angle)*len;
    const bx = (cx+ex)/2+(rng()-0.5)*len*0.22;
    const by = (cy+ey)/2+(rng()-0.5)*len*0.14;
    tcx.strokeStyle = col;
    tcx.lineWidth   = Math.max(0.7, depth*1.65);
    tcx.lineCap     = 'round';
    tcx.beginPath(); tcx.moveTo(cx,cy);
    tcx.quadraticCurveTo(bx,by,ex,ey);
    tcx.stroke();
    const nl  = len*(0.57+rng()*0.14);
    const s1  = 0.29+rng()*0.18;
    const s2  = 0.23+rng()*0.16;
    branchDraw(tcx,rng,ex,ey,angle-s1,nl,depth-1,col);
    branchDraw(tcx,rng,ex,ey,angle+s2,nl*0.91,depth-1,col);
    if (depth>3 && rng()>0.38) branchDraw(tcx,rng,ex,ey,angle-s1*0.1,nl*0.77,depth-2,col);
}

function buildTreeCanvas(modeName) {
    const tc  = document.createElement('canvas');
    tc.width  = W; tc.height = H;
    const tcx = tc.getContext('2d');
    const m   = MODES[modeName];
    const rng = makeRng(2025);
    const col = `rgb(${m.treeRgb.join(',')})`;

    // Branches skeleton
    branchDraw(tcx,rng,W*0.13,H*0.83,-Math.PI/2,H*0.295,8,col);
    branchDraw(tcx,rng,W*0.87,H*0.83,-Math.PI/2,H*0.295,8,col);
    branchDraw(tcx,rng,W*0.50,H*0.895,-Math.PI/2,H*0.195,6,col);

    // Blossom clouds (soft radial-gradient blobs)
    const br = m.blossomRgb.join(',');
    const ba = m.blossomA;
    const zones = [
        {cx:W*0.13,cy:H*0.385,rx:H*0.195,ry:H*0.145},
        {cx:W*0.87,cy:H*0.385,rx:H*0.195,ry:H*0.145},
        {cx:W*0.50,cy:H*0.545,rx:H*0.132,ry:H*0.100},
    ];
    const brng = makeRng(777);
    for (const z of zones) {
        for (let i=0; i<16; i++) {
            const bx = z.cx+(brng()-0.5)*z.rx*2.3;
            const by = z.cy+(brng()-0.5)*z.ry*2.1;
            const r  = brng()*z.rx*0.68+z.rx*0.26;
            const a  = (brng()*0.38+0.38)*ba;
            const g  = tcx.createRadialGradient(bx,by,0,bx,by,r);
            g.addColorStop(0,   `rgba(${br},${a})`);
            g.addColorStop(0.52,`rgba(${br},${a*0.52})`);
            g.addColorStop(1,   `rgba(${br},0)`);
            tcx.beginPath(); tcx.arc(bx,by,r,0,Math.PI*2);
            tcx.fillStyle = g; tcx.fill();
        }
    }
    return tc;
}

// Blossom spawn zones (same geometry as tree clouds)
function blossomZones() {
    return [
        {x:W*0.13,y:H*0.385,r:H*0.185},
        {x:W*0.87,y:H*0.385,r:H*0.185},
        {x:W*0.50,y:H*0.545,r:H*0.120},
    ];
}

// ============================================================
// PETAL CLASS
// ============================================================
class Petal {
    constructor(x, y, burst) {
        this.burst  = !!burst;
        this.dead   = false;
        this.life   = 1.0;
        this.rot    = Math.random()*Math.PI*2;
        this.rotSpd = (Math.random()-0.5)*0.092;
        this.phase  = Math.random()*Math.PI*2;
        this.freq   = Math.random()*0.022+0.008;
        this.amp    = Math.random()*1.05+0.3;
        this.cIdx   = Math.floor(Math.random()*5);

        if (this.burst) {
            this.x = x; this.y = y;
            const spd = Math.random()*7+2.5;
            const ang = Math.random()*Math.PI*2;
            this.vx = Math.cos(ang)*spd;
            this.vy = Math.sin(ang)*spd-3.2;
            this.sz  = Math.random()*6+4;
            this.opa = Math.random()*0.5+0.5;
        } else {
            const z  = blossomZones();
            const zz = z[Math.floor(Math.random()*z.length)];
            this.x   = zz.x+(Math.random()-0.5)*zz.r*2.1;
            this.y   = zz.y-zz.r*0.55+(Math.random()-0.5)*zz.r;
            this.vx  = (Math.random()-0.5)*1.55;
            this.vy  = Math.random()*0.62+0.22;
            this.sz  = Math.random()*9+4;
            this.opa = Math.random()*0.55+0.38;
        }
    }

    update(wind, t) {
        if (this.burst) {
            this.vy  += 0.22;
            this.vx  *= 0.974;
            this.life -= 0.014;
        } else {
            const sw = Math.sin(t*this.freq+this.phase)*this.amp;
            this.vx  = this.vx*0.984+wind*0.016;
            if (this.y > H*0.80) { this.life -= 0.028; this.vy *= 0.88; }
            if (this.x < -85) this.x = W+85;
            if (this.x > W+85) this.x = -85;
            this.x += sw;
        }
        this.x   += this.vx;
        this.y   += this.vy;
        this.rot += this.rotSpd;
        if (this.life <= 0 || this.y > H+60) this.dead = true;
    }

    draw(ctx, pal) {
        const a = this.opa*Math.max(0, this.life);
        if (a < 0.025 || this.dead) return;
        const s = this.sz;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rot);
        ctx.globalAlpha = a;
        ctx.fillStyle   = pal[this.cIdx % pal.length];

        // Sakura petal: two top lobes with notch, tapered base
        ctx.beginPath();
        ctx.moveTo(0, s*0.96);
        ctx.bezierCurveTo( s*0.66,  s*0.36,  s*0.73, -s*0.24,  s*0.29, -s*0.52);
        ctx.bezierCurveTo( s*0.12, -s*0.73,  s*0.04, -s*0.62,  0,      -s*0.47);
        ctx.bezierCurveTo(-s*0.04, -s*0.62, -s*0.12, -s*0.73, -s*0.29, -s*0.52);
        ctx.bezierCurveTo(-s*0.73, -s*0.24, -s*0.66,  s*0.36,  0,       s*0.96);
        ctx.closePath();
        ctx.fill();

        // Inner highlight
        ctx.globalAlpha = a*0.23;
        ctx.fillStyle   = 'rgba(255,255,255,0.9)';
        ctx.beginPath();
        ctx.ellipse(s*0.08, s*0.06, s*0.19, s*0.37, 0.14, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }
}

// ============================================================
// PETALS STATE
// ============================================================
let petals = [];
const MAX_PETALS = 210;
let frameCount = 0;
let windForce  = 0.9;

// ============================================================
// HAIKU
// ============================================================
const HAIKU = [
    {text:'花の雲\n鐘は上野か\n浅草か',   author:'松尾芭蕉'},
    {text:'さまざまの\n事おもひ出す\n桜かな', author:'松尾芭蕉'},
    {text:'散る桜\n残る桜も\n散る桜',    author:'良　寛'},
    {text:'願はくは\n花のしたにて\n春死なん', author:'西　行'},
    {text:'花の夜や\n月に溶け込む\n薄紅よ', author:''},
    {text:'宵の風\n花びら運ぶ\n静けさよ', author:''},
    {text:'ひとひらの\n桜舞い来て\n手に消ゆる', author:''},
];
let haikuIdx = 0, haikuAnim = null;

function showHaiku(alpha) {
    const h  = HAIKU[haikuIdx];
    const el = document.getElementById('haiku-text');
    const au = document.getElementById('haiku-author');
    el.textContent = h.text;
    au.textContent = h.author ? `— ${h.author}` : '';
    el.style.opacity = alpha;
    au.style.opacity = alpha;
}

function nextHaiku() {
    if (haikuAnim) return;
    let v = 1.0;
    haikuAnim = setInterval(() => {
        v -= 0.1; showHaiku(Math.max(0,v));
        if (v <= 0) {
            haikuIdx = (haikuIdx+1) % HAIKU.length;
            clearInterval(haikuAnim);
            haikuAnim = setInterval(() => {
                v += 0.1; showHaiku(Math.min(1,v));
                if (v >= 1) { clearInterval(haikuAnim); haikuAnim = null; }
            }, 28);
        }
    }, 28);
}
setInterval(nextHaiku, 11500);

// ============================================================
// AUDIO (Web Audio API)
// ============================================================
let audioCtx=null, masterGain=null, soundOn=false;

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0;
    masterGain.connect(audioCtx.destination);

    // Wind noise band
    const sr  = audioCtx.sampleRate;
    const buf = audioCtx.createBuffer(1, sr*3, sr);
    const d   = buf.getChannelData(0);
    for (let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const ns = audioCtx.createBufferSource();
    ns.buffer = buf; ns.loop = true;
    const bpf = audioCtx.createBiquadFilter();
    bpf.type = 'bandpass'; bpf.frequency.value = 360; bpf.Q.value = 0.55;
    const wg  = audioCtx.createGain(); wg.gain.value = 0.11;
    ns.connect(bpf); bpf.connect(wg); wg.connect(masterGain);
    ns.start();

    scheduleKoto();
}

const KOTO = [261.63,293.66,329.63,392.00,440.00,523.25,587.33,659.25];
function scheduleKoto() {
    if (!audioCtx) return;
    setTimeout(() => {
        if (soundOn) playKoto(KOTO[Math.floor(Math.random()*KOTO.length)]);
        scheduleKoto();
    }, 1400+Math.random()*2800);
}

function playKoto(freq, g=0.10) {
    if (!audioCtx || !soundOn) return;
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.type = 'triangle'; osc.frequency.value = freq;
    const now = audioCtx.currentTime;
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(g, now+0.013);
    env.gain.exponentialRampToValueAtTime(0.001, now+2.1);
    osc.connect(env); env.connect(masterGain);
    osc.start(now); osc.stop(now+2.3);
}

function toggleSound() {
    if (!audioCtx) initAudio();
    soundOn = !soundOn;
    if (soundOn) { audioCtx.resume(); masterGain.gain.linearRampToValueAtTime(1, audioCtx.currentTime+0.55); }
    else          masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.45);
    const btn = document.getElementById('snd-btn');
    btn.textContent = soundOn ? '♪ 音 ON' : '♪ 音';
    btn.classList.toggle('on', soundOn);
}

// ============================================================
// DRAW
// ============================================================

function drawSky(m) {
    const g = ctx.createLinearGradient(0,0,0,H);
    m.sky.forEach((c,i) => g.addColorStop(m.skyPos[i],c));
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
}

function drawStars(m, t) {
    if (!m.showStars || m.lanternA < 0.05) return;
    ctx.save();
    for (const s of stars) {
        const tw = (0.52+0.48*Math.sin(t*s.spd+s.phase))*m.lanternA;
        ctx.globalAlpha = tw;
        ctx.fillStyle   = '#F5F5FF';
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

function drawMoon(m) {
    if (!m.showMoon) return;
    const mx=W*0.72, my=H*0.155, r=Math.min(W,H)*0.056;
    ctx.save();
    const og = ctx.createRadialGradient(mx,my,r*0.55,mx,my,r*4.8);
    og.addColorStop(0,`rgba(255,242,195,${0.14*m.lanternA})`);
    og.addColorStop(1,'rgba(255,240,180,0)');
    ctx.fillStyle=og; ctx.beginPath(); ctx.arc(mx,my,r*4.8,0,Math.PI*2); ctx.fill();
    const mg = ctx.createRadialGradient(mx-r*0.24,my-r*0.19,0,mx,my,r);
    mg.addColorStop(0,'#FFFFF5'); mg.addColorStop(0.68,'#F5ECC5'); mg.addColorStop(1,'#DFCE7A');
    ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(mx,my,r,0,Math.PI*2); ctx.fill();
    ctx.restore();
}

function drawMountains(m) {
    ctx.save();
    ctx.beginPath(); ctx.moveTo(0,H);
    for (const p of mountainPts) ctx.lineTo(p.x,p.y);
    ctx.lineTo(W,H); ctx.closePath();
    const minY = Math.min(...mountainPts.map(p=>p.y));
    const g = ctx.createLinearGradient(0,minY,0,H*0.68);
    const {r,g:g2,b,a} = m.mountain;
    g.addColorStop(0,`rgba(${r},${g2},${b},${a})`);
    g.addColorStop(1,`rgba(${r},${g2},${b},${a*0.52})`);
    ctx.fillStyle=g; ctx.fill();
    ctx.restore();
}

function drawTorii(m) {
    const {r,g,b,a} = m.torii;
    if (a < 0.02) return;
    const col=`rgba(${r},${g},${b},${a})`;
    const tx=W*0.5, ty=H*0.59, sc=H*0.165;
    ctx.save(); ctx.fillStyle=col;
    // Left pillar
    ctx.fillRect(tx-sc*0.43,ty-sc,sc*0.082,sc*1.06);
    // Right pillar
    ctx.fillRect(tx+sc*0.348,ty-sc,sc*0.082,sc*1.06);
    // Nuki (lower beam)
    ctx.fillRect(tx-sc*0.52,ty-sc*0.82,sc*1.04,sc*0.092);
    // Kasagi (upper curved beam — approximate as trapezoid)
    ctx.beginPath();
    ctx.moveTo(tx-sc*0.60, ty-sc*0.94+sc*0.092);
    ctx.lineTo(tx+sc*0.60, ty-sc*0.94+sc*0.092);
    ctx.lineTo(tx+sc*0.54, ty-sc*0.96);
    ctx.lineTo(tx-sc*0.54, ty-sc*0.96);
    ctx.closePath(); ctx.fill();
    // Shimaki
    ctx.fillRect(tx-sc*0.40,ty-sc*0.89,sc*0.80,sc*0.058);
    ctx.restore();
}

function drawBlossomOverlay(m) {
    const [br,bg2,bb]=m.blossomRgb, ba=m.blossomA;
    const zones=[
        {x:W*0.13,y:H*0.385,r:H*0.22},
        {x:W*0.87,y:H*0.385,r:H*0.22},
        {x:W*0.50,y:H*0.545,r:H*0.14},
    ];
    ctx.save();
    for (const z of zones) {
        const g=ctx.createRadialGradient(z.x,z.y,0,z.x,z.y,z.r*1.25);
        g.addColorStop(0,  `rgba(${br},${bg2},${bb},${ba*0.40})`);
        g.addColorStop(0.48,`rgba(${br},${bg2},${bb},${ba*0.18})`);
        g.addColorStop(1,  `rgba(${br},${bg2},${bb},0)`);
        ctx.fillStyle=g;
        ctx.beginPath(); ctx.arc(z.x,z.y,z.r*1.25,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

function drawGround(m) {
    const gy=H*0.815;
    const g=ctx.createLinearGradient(0,gy,0,H);
    g.addColorStop(0,m.ground.top); g.addColorStop(1,m.ground.bot);
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.moveTo(0,gy);
    for (let x=0;x<=W;x+=14) ctx.lineTo(x, gy+Math.sin(x*0.018)*5.5);
    ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();
}

function drawWater(m) {
    const wy=H*0.835, wh=H*0.068;
    const {r,g,b,a}=m.water;
    ctx.save();
    const wg=ctx.createLinearGradient(0,wy,0,wy+wh);
    wg.addColorStop(0,`rgba(${r},${g},${b},${a})`);
    wg.addColorStop(1,`rgba(${r},${g},${b},0)`);
    ctx.fillStyle=wg;
    ctx.beginPath(); ctx.ellipse(W*0.5,wy+wh*0.4,W*0.39,wh*0.56,0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=0.2*a*2.2; ctx.strokeStyle='rgba(255,255,255,0.75)'; ctx.lineWidth=1;
    for (let i=0;i<4;i++) {
        const sx=W*0.28+i*W*0.12+Math.sin(frameCount*0.024+i*1.3)*13;
        ctx.beginPath(); ctx.moveTo(sx,wy+wh*0.34); ctx.lineTo(sx+24,wy+wh*0.34); ctx.stroke();
    }
    ctx.restore();
}

function drawFog(m) {
    const {r,g,b,a}=m.fog; if (a<0.01) return;
    const fg=ctx.createLinearGradient(0,H*0.74,0,H*0.87);
    fg.addColorStop(0,`rgba(${r},${g},${b},0)`);
    fg.addColorStop(0.5,`rgba(${r},${g},${b},${a})`);
    fg.addColorStop(1,`rgba(${r},${g},${b},0)`);
    ctx.fillStyle=fg; ctx.fillRect(0,H*0.74,W,H*0.13);
}

function drawLanterns(m, t) {
    const ga=m.lanternA; if (ga<0.02) return;
    ctx.save();
    // String
    const lx0=W*0.17, lx1=W*0.83, ly0=H*0.354;
    ctx.strokeStyle=`rgba(158,122,86,${ga*0.52})`; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(lx0,ly0);
    for (let x=lx0;x<=lx1;x+=4) {
        const tl=(x-lx0)/(lx1-lx0), sag=4*0.095*tl*(1-tl)*H*0.12;
        ctx.lineTo(x,ly0+sag);
    }
    ctx.stroke();

    for (let i=0;i<lanternPts.length;i++) {
        const sw=Math.sin(t*0.013+i*0.82)*4;
        const lx=lanternPts[i].x+sw;
        const ly=lanternPts[i].y+Math.sin(t*0.011+i*0.62)*2.6;
        const lw=12.5, lh=18.5;

        // Glow halo
        const halo=ctx.createRadialGradient(lx,ly,1,lx,ly,lw*3.4);
        halo.addColorStop(0,`rgba(255,192,88,${ga*0.52})`);
        halo.addColorStop(1,'rgba(255,140,38,0)');
        ctx.fillStyle=halo; ctx.beginPath(); ctx.arc(lx,ly,lw*3.4,0,Math.PI*2); ctx.fill();

        // Body (red)
        ctx.fillStyle=`rgba(192,38,38,${ga*0.96})`;
        ctx.beginPath(); ctx.ellipse(lx,ly,lw*0.47,lh*0.50,0,0,Math.PI*2); ctx.fill();

        // Inner glow
        const ig=ctx.createRadialGradient(lx,ly*0.972,0,lx,ly,lw*0.43);
        ig.addColorStop(0,`rgba(255,215,105,${ga*0.78})`);
        ig.addColorStop(1,`rgba(255,138,38,${ga*0.08})`);
        ctx.fillStyle=ig; ctx.beginPath(); ctx.ellipse(lx,ly,lw*0.43,lh*0.46,0,0,Math.PI*2); ctx.fill();

        // Ribs
        ctx.strokeStyle=`rgba(138,22,22,${ga*0.88})`; ctx.lineWidth=0.75;
        for (let ri=-2;ri<=2;ri++) {
            const ry=ly+ri*lh*0.148;
            const rw=Math.sqrt(Math.max(0,1-(ri*lh*0.148/(lh*0.5))**2))*lw*0.47;
            ctx.beginPath(); ctx.moveTo(lx-rw,ry); ctx.lineTo(lx+rw,ry); ctx.stroke();
        }

        // Caps
        ctx.fillStyle=`rgba(68,12,12,${ga})`;
        ctx.beginPath(); ctx.ellipse(lx,ly-lh*0.492,lw*0.27,lh*0.072,0,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(lx,ly+lh*0.492,lw*0.27,lh*0.072,0,0,Math.PI*2); ctx.fill();

        // Tassel
        ctx.strokeStyle=`rgba(192,172,42,${ga*0.68})`; ctx.lineWidth=0.9;
        ctx.beginPath(); ctx.moveTo(lx,ly+lh*0.58); ctx.lineTo(lx,ly+lh*0.98); ctx.stroke();
    }
    ctx.restore();
}

// ============================================================
// RENDER + UPDATE
// ============================================================

function update() {
    if (modeT < 1) modeT = Math.min(1, modeT+TRANS_SPD);
    if (petals.length < MAX_PETALS && frameCount % 3 === 0)
        petals.push(new Petal(0,0,false));
    petals.forEach(p => p.update(windForce, frameCount));
    petals = petals.filter(p => !p.dead);
    frameCount++;
}

function render() {
    const m = getM(), t = frameCount;
    drawSky(m);
    drawStars(m, t);
    drawMoon(m);
    drawMountains(m);
    drawTorii(m);

    // Trees — blend between prev and cur during transition
    if (modeT < 1 && prevTree && curTree) {
        ctx.save();
        ctx.globalAlpha=1-modeT; ctx.drawImage(prevTree,0,0);
        ctx.globalAlpha=modeT;   ctx.drawImage(curTree,0,0);
        ctx.restore();
    } else if (curTree) {
        ctx.drawImage(curTree,0,0);
    }

    drawBlossomOverlay(m);
    petals.forEach(p => p.draw(ctx, m.petalPalette));
    drawGround(m);
    drawWater(m);
    drawFog(m);
    drawLanterns(m, t);
}

function loop() { update(); render(); requestAnimationFrame(loop); }

// ============================================================
// RESIZE
// ============================================================
function onResize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    buildStars();
    buildMountains();
    buildLanterns();
    prevTree = null;
    curTree  = buildTreeCanvas(curMode);
}

// ============================================================
// EVENTS
// ============================================================
canvas.addEventListener('click', e => {
    const n = 18+Math.floor(Math.random()*15);
    for (let i=0; i<n && petals.length < MAX_PETALS+90; i++)
        petals.push(new Petal(e.clientX, e.clientY, true));
    if (soundOn && audioCtx)
        playKoto(KOTO[Math.floor(Math.random()*KOTO.length)]*(0.85+Math.random()*0.32), 0.13);
});

document.querySelectorAll('.t-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const nm = btn.dataset.mode;
        if (nm === curMode) return;
        prevMode = curMode; curMode = nm; modeT = 0;
        prevTree = curTree;
        curTree  = buildTreeCanvas(nm);
        document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    });
});

document.getElementById('wind').addEventListener('input', e => {
    windForce = parseFloat(e.target.value);
});
document.getElementById('snd-btn').addEventListener('click', toggleSound);
document.getElementById('haiku-btn').addEventListener('click', nextHaiku);

// ============================================================
// LAUNCH
// ============================================================
onResize();
window.addEventListener('resize', onResize);
showHaiku(1);
loop();
</script>
</body>
</html>
